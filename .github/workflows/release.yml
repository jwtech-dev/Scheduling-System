name: Build & Release Electron App

on:
  push:
    tags:
      - 'v*' # Triggers on v0.1.0, v0.2.0, etc.

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write # Required to upload assets to GitHub Releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Configure MSVC/VS Version
        run: npm config set msvs_version 2022 --global

      - name: Install dependencies
        run: npm ci

      - name: Build & Publish App
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Provided automatically by GitHub Actions
        run: |
          npm run build
          npx electron-builder --publish always
